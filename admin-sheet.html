<script>

    // ==========================================================
    // PARSER DE PRODUCTOS DESDE WHATSAPP
    // ==========================================================
    
    function parseProductsFromWhatsApp(text) {
        // Soporta múltiples formatos
        const lines = text.split('\n').filter(l => l.trim());
        const products = [];
        
        // Formato 1: clave: valor
        let current = {};
        for (let line of lines) {
            line = line.trim();
            if (line.toLowerCase().startsWith('título:') || line.toLowerCase().startsWith('titulo:')) {
                if (current.title && current.price && current.category && current.contact && current.image) {
                    products.push({ ...current });
                }
                current = { title: line.split(':')[1].trim() };
            } else if (line.toLowerCase().startsWith('precio:')) {
                current.price = line.split(':')[1].trim();
            } else if (line.toLowerCase().startsWith('categoría:') || line.toLowerCase().startsWith('categoria:')) {
                current.category = line.split(':')[1].trim().toLowerCase();
            } else if (line.toLowerCase().startsWith('whatsapp:') || line.toLowerCase().startsWith('contacto:')) {
                current.contact = line.split(':')[1].trim();
            } else if (line.toLowerCase().startsWith('foto:') || line.toLowerCase().startsWith('imagen:')) {
                current.image = line.split(':')[1].trim();
            } else if (line.toLowerCase().startsWith('vendedor:')) {
                current.seller = line.split(':')[1].trim();
            }
        }
        if (current.title && current.price && current.category && current.contact && current.image) {
            products.push(current);
        }
        
        // Si no se encontró en formato clave:valor, probar formato | separado
        if (products.length === 0) {
            for (let line of lines) {
                const parts = line.split('|').map(p => p.trim());
                if (parts.length >= 5) {
                    products.push({
                        title: parts[0],
                        price: parts[1],
                        category: parts[2].toLowerCase(),
                        contact: parts[3],
                        image: parts[4],
                        seller: parts[5] || ''
                    });
                }
            }
        }
        
        return products;
    }
    
    function checkDuplicates(newProducts, existingProducts) {
        const duplicates = [];
        const unique = [];
        
        for (let newP of newProducts) {
            const exists = existingProducts.some(existingP => 
                existingP.title.toLowerCase() === newP.title.toLowerCase() &&
                existingP.contact === newP.contact
            );
            if (exists) {
                duplicates.push(newP);
            } else {
                unique.push(newP);
            }
        }
        
        return { unique, duplicates };
    }
    
    async function publishBatch(productsList, sellerInfo) {
        const now = Date.now();
        const batchId = 'batch_' + now;
        
        const newProducts = productsList.map((p, index) => ({
            id: `prod_${now}_${index}_${Math.random().toString(36).substr(2, 4)}`,
            title: p.title,
            price: p.price,
            category: p.category,
            contact: p.contact,
            image: p.image,
            seller: sellerInfo.name || p.seller || 'Anónimo',
            seller_phone: sellerInfo.phone || p.contact,
            last_updated: now - (index * 1000), // para que mantengan el orden
            sold: false,
            batch_id: batchId
        }));
        
        const result = await saveProductsToSheet(newProducts);
        return { success: result.success, count: newProducts.length, products: newProducts };
    }
    
    // ==========================================================
    // RENDERIZADO DEL PANEL
    // ==========================================================
    
    async function loadProducts() {
        products = await loadProductsFromSheet();
        renderProductList();
    }
    
    function renderProductList() {
        const listDiv = document.getElementById('productList');
        if (!listDiv) return;
        
        // Agrupar por vendedor
        const grouped = {};
        for (let p of products) {
            const seller = p.seller || 'Anónimo';
            if (!grouped[seller]) grouped[seller] = [];
            grouped[seller].push(p);
        }
        
        if (products.length === 0) {
            listDiv.innerHTML = '<p>No hay productos aún.</p>';
            return;
        }
        
        let html = '';
        for (let [seller, sellerProducts] of Object.entries(grouped)) {
            html += `
                <div class="seller-group">
                    <div class="seller-name">📦 Vendedor: ${escapeHtml(seller)} (${sellerProducts.length} productos)</div>
                    ${sellerProducts.map(p => `
                        <div class="product-row">
                            <span>${escapeHtml(p.title)} - ${escapeHtml(p.price)}</span>
                            <span>
                                ${p.sold ? '🔴 Vendido' : '🟢 Activo'}
                                <span class="delete-icon" onclick="deleteProduct('${p.id}')">🗑️</span>
                            </span>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        listDiv.innerHTML = html;
    }
    
    async function deleteProduct(id) {
        if (!confirm('¿Eliminar este producto?')) return;
        await deleteProductFromSheet(id);
        await loadProducts();
    }
    
    function renderAdminPanel() {
        document.getElementById('app').innerHTML = `
            <div class="container">
                <h1>👑 WhatsApp Admin - RESUELVEhabana</h1>
                <p style="margin-bottom:16px; color:#aaa;">Gestiona productos enviados por vendedores de WhatsApp</p>
                
                <div class="tabs">
                    <div class="tab active" data-tab="batch">📦 Carga desde WhatsApp</div>
                    <div class="tab" data-tab="manage">📋 Gestionar productos</div>
                </div>
                
                <!-- Pestaña: Carga masiva desde WhatsApp -->
                <div id="tab-batch" class="tab-content active">
                    <h2>📱 Productos enviados por WhatsApp</h2>
                    
                    <div style="background:#0a1a2a; padding:12px; border-radius:12px; margin-bottom:16px;">
                        <label style="display:block; margin-bottom:8px;">📝 Nombre del vendedor (quien envió los productos):</label>
                        <input type="text" id="sellerName" placeholder="Ej: Carlos Pérez (opcional)">
                        <label style="display:block; margin-bottom:8px; margin-top:12px;">📞 Teléfono del vendedor:</label>
                        <input type="text" id="sellerPhone" placeholder="Ej: 5351234567">
                    </div>
                    
                    <textarea id="batchText" rows="8" placeholder="Pega aquí los productos que llegaron por WhatsApp..."></textarea>
                    
                    <button id="previewBatchBtn">🔍 Previsualizar y verificar duplicados</button>
                    <div id="batchPreview" class="batch-preview" style="display:none;"></div>
                    
                    <button id="publishBatchBtn" style="background:#2ecc71;">🚀 Publicar todos los productos</button>
                    <div id="batchResult"></div>
                </div>
                
                <!-- Pestaña: Gestionar productos existentes -->
                <div id="tab-manage" class="tab-content">
                    <h2>📋 Productos actuales</h2>
                    <div id="productList">Cargando...</div>
                </div>
                
                <hr>
                <button class="logout" id="logoutBtn">🔒 Cerrar sesión</button>
            </div>
        `;
        
        // Tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
            });
        });
        
        // Previsualizar
        document.getElementById('previewBatchBtn').addEventListener('click', () => {
            const text = document.getElementById('batchText').value;
            const productsList = parseProductsFromWhatsApp(text);
            const previewDiv = document.getElementById('batchPreview');
            
            if (productsList.length === 0) {
                previewDiv.innerHTML = '<div class="error">No se encontraron productos. Revisa el formato.</div>';
                previewDiv.style.display = 'block';
                return;
            }
            
            // Verificar duplicados con productos existentes
            const { unique, duplicates } = checkDuplicates(productsList, products);
            
            let html = `<div class="stats-batch">📦 Se encontraron ${productsList.length} productos (${unique.length} nuevos, ${duplicates.length} duplicados)</div>`;
            
            if (duplicates.length > 0) {
                html += `<div class="warning">⚠️ Productos duplicados (no se publicarán):</div>`;
                duplicates.forEach(p => {
                    html += `<div class="batch-item">❌ ${escapeHtml(p.title)} - ${escapeHtml(p.price)}</div>`;
                });
            }
            
            if (unique.length > 0) {
                html += `<div class="success">✅ Productos a publicar (${unique.length}):</div>`;
                unique.forEach((p, i) => {
                    html += `
                        <div class="batch-item">
                            <strong>${i+1}.</strong> ${escapeHtml(p.title)}<br>
                            💰 ${escapeHtml(p.price)} | 📂 ${p.category} | 📞 ${p.contact}<br>
                            📷 ${p.image ? escapeHtml(p.image.substring(0, 50)) + '...' : 'Sin imagen'}
                        </div>
                    `;
                });
            }
            
            previewDiv.innerHTML = html;
            previewDiv.style.display = 'block';
            window.pendingProducts = unique;
        });
        
        // Publicar lote
        document.getElementById('publishBatchBtn').addEventListener('click', async () => {
            const text = document.getElementById('batchText').value;
            let productsList = parseProductsFromWhatsApp(text);
            
            if (productsList.length === 0) {
                document.getElementById('batchResult').innerHTML = '<div class="error">No hay productos para publicar</div>';
                return;
            }
            
            // Filtrar duplicados
            const { unique } = checkDuplicates(productsList, products);
            
            if (unique.length === 0) {
                document.getElementById('batchResult').innerHTML = '<div class="warning">Todos los productos ya existen (duplicados)</div>';
                return;
            }
            
            const sellerName = document.getElementById('sellerName').value;
            const sellerPhone = document.getElementById('sellerPhone').value;
            
            if (!confirm(`¿Publicar ${unique.length} productos de ${sellerName || 'vendedor'}?`)) return;
            
            document.getElementById('batchResult').innerHTML = '<div class="success">⏳ Publicando...</div>';
            
            const result = await publishBatch(unique, { name: sellerName, phone: sellerPhone });
            
            if (result.success) {
                document.getElementById('batchResult').innerHTML = `<div class="success">✅ ¡${result.count} productos publicados exitosamente de ${sellerName || 'vendedor'}!</div>`;
                document.getElementById('batchText').value = '';
                document.getElementById('batchPreview').style.display = 'none';
                document.getElementById('sellerName').value = '';
                document.getElementById('sellerPhone').value = '';
                await loadProducts();
            } else {
                document.getElementById('batchResult').innerHTML = '<div class="error">❌ Error al publicar</div>';
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('admin_auth');
            isLoggedIn = false;
            renderLogin();
        });
        
        loadProducts();
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }
    
    window.deleteProduct = deleteProduct;
    
    checkAuth();
</script>
