<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Carrito - RESUELVEhabana</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="js/cart-state.js"></script>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    error: "#ba1a1a", "error-container": "#ffdad6", "background": "#f3fcf0", "surface": "#f3fcf0",
                    primary: "#00535b", "secondary-container": "#ffb702", "secondary": "#7d5800", "tertiary": "#990030",
                    "surface-container-lowest": "#ffffff", "surface-container-low": "#edf6ea", "outline-variant": "#bec8ca",
                    "on-surface-variant": "#3e494a", "on-primary": "#ffffff", "on-secondary-container": "#6b4b00"
                },
                borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
                spacing: { md: "24px", lg: "48px", base: "8px", sm: "12px", xl: "80px", "container-max": "1200px", xs: "4px", gutter: "16px" },
                fontFamily: { "headline-md": ["Montserrat"], "body-md": ["Quicksand"], "display-lg-mobile": ["Montserrat"], "label-sm": ["Quicksand"] },
                fontSize: { "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }], "body-md": ["16px", { lineHeight: "1.6", fontWeight: "500" }], "display-lg-mobile": ["32px", { lineHeight: "1.2", fontWeight: "700" }], "label-sm": ["14px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "700" }] }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Quicksand', sans-serif; background-color: #f3fcf0; }
    .cart-badge { display: none; }
</style>
</head>
<body class="bg-background text-on-surface">

<header class="flex justify-between items-center w-full px-gutter h-16 sticky top-0 z-50 bg-surface shadow-md">
    <div class="flex items-center gap-sm">
        <a href="index.html" class="material-symbols-outlined text-primary p-2 hover:bg-surface-variant rounded-full">arrow_back</a>
        <h1 class="font-display-lg-mobile text-display-lg-mobile text-primary">RESUELVEhabana</h1>
    </div>
    <div class="relative">
        <span class="material-symbols-outlined text-primary p-2 bg-surface-variant rounded-full">shopping_cart</span>
        <span class="cart-badge absolute top-1 right-1 bg-tertiary text-white text-[10px] font-bold w-4 h-4 flex items-center justify-center rounded-full">0</span>
    </div>
</header>

<main class="max-w-container-max mx-auto px-gutter py-md pb-28">
    <div class="flex flex-col lg:grid lg:grid-cols-12 gap-6">
        <!-- Cart Items -->
        <section class="lg:col-span-7">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-headline-md text-headline-md text-primary">Tu Carrito</h2>
                <span id="cartItemCount" class="bg-surface-container-high px-3 py-1 rounded-full text-sm">0 productos</span>
            </div>
            <div id="cartItemsContainer" class="space-y-3">
                <div class="text-center py-12 text-on-surface-variant">🛒 Tu carrito está vacío</div>
            </div>
            <a href="index.html" class="inline-flex items-center gap-2 text-primary mt-4 hover:underline">
                <span class="material-symbols-outlined">chevron_left</span> Seguir comprando
            </a>
        </section>

        <!-- Checkout -->
        <aside class="lg:col-span-5">
            <div class="bg-surface-container-low rounded-xl p-5 shadow-md sticky top-20">
                <h2 class="font-headline-md text-headline-md text-primary mb-4">Detalles del Pedido</h2>
                <form id="checkoutForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-primary mb-1">Nombre completo</label>
                        <input id="checkoutName" type="text" required class="w-full p-3 bg-surface-container-lowest rounded-lg border border-outline-variant/30 focus:ring-2 focus:ring-primary outline-none" placeholder="Ej. Juan Pérez">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-primary mb-1">Dirección (Habana)</label>
                        <textarea id="checkoutAddress" rows="2" required class="w-full p-3 bg-surface-container-lowest rounded-lg border border-outline-variant/30 focus:ring-2 focus:ring-primary outline-none" placeholder="Calle 23 #456, Vedado"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-primary mb-1">Número de contacto</label>
                        <input id="checkoutPhone" type="tel" required class="w-full p-3 bg-surface-container-lowest rounded-lg border border-outline-variant/30 focus:ring-2 focus:ring-primary outline-none" placeholder="+53 5XXX-XXXX">
                    </div>

                    <div class="pt-4 border-t border-outline-variant/20">
                        <div class="flex justify-between mb-2">
                            <span>Subtotal</span>
                            <span id="subtotalDisplay">$0.00 USD</span>
                        </div>
                        <div class="flex justify-between mb-2">
                            <span>Envío (Fijo)</span>
                            <span>$2.50 USD</span>
                        </div>
                        <div class="flex justify-between text-xl font-bold pt-3 border-t mt-2">
                            <span class="text-primary">Total</span>
                            <span id="totalDisplay" class="text-secondary">$2.50 USD</span>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-secondary-container text-on-secondary-container py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:brightness-95 transition-all active:scale-95">
                        <span class="material-symbols-outlined">chat</span> Enviar pedido por WhatsApp
                    </button>
                    <p class="text-center text-xs text-on-surface-variant italic">Serás redirigido a WhatsApp para finalizar el pago.</p>
                </form>
            </div>
        </aside>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 bg-surface-container-lowest border-t shadow-[0_-4px_12px_rgba(0,109,119,0.08)] rounded-t-xl">
    <a href="index.html" class="flex flex-col items-center text-on-surface-variant">
        <span class="material-symbols-outlined">storefront</span>
        <span class="font-label-sm text-label-sm">Tienda</span>
    </a>
    <a href="cart.html" class="flex flex-col items-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1">
        <span class="material-symbols-outlined">shopping_basket</span>
        <span class="font-label-sm text-label-sm">Carrito</span>
    </a>
</nav>

<script>
    function renderCart() {
        const cart = getCart();
        const container = document.getElementById("cartItemsContainer");
        const cartItemCountSpan = document.getElementById("cartItemCount");
        const totalItems = getCartTotalItems();
        
        cartItemCountSpan.innerText = totalItems + (totalItems === 1 ? " producto" : " productos");
        
        if (cart.length === 0) {
            container.innerHTML = '<div class="text-center py-12 text-on-surface-variant">🛒 Tu carrito está vacío</div>';
            updateTotals();
            return;
        }
        
        container.innerHTML = cart.map(item => `
            <div class="bg-surface-container-lowest rounded-xl p-4 flex gap-4 shadow-sm border border-outline-variant/20" data-id="${item.id}">
                <div class="w-20 h-20 rounded-lg overflow-hidden bg-surface-container-low flex-shrink-0">
                    <img src="${item.img}" class="w-full h-full object-cover">
                </div>
                <div class="flex-grow">
                    <h3 class="font-bold text-primary">${item.name}</h3>
                    <p class="text-xs text-on-surface-variant">${item.category}</p>
                    <div class="flex justify-between items-center mt-2">
                        <span class="font-bold text-secondary">${item.price} CUP ($${item.priceUSD.toFixed(2)} USD)</span>
                        <div class="flex items-center gap-2 bg-surface-container-high rounded-full px-2 py-1">
                            <button class="qty-dec w-7 h-7 rounded-full flex items-center justify-center hover:bg-surface-variant" data-id="${item.id}">-</button>
                            <span class="font-bold w-6 text-center">${item.quantity}</span>
                            <button class="qty-inc w-7 h-7 rounded-full flex items-center justify-center hover:bg-surface-variant" data-id="${item.id}">+</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join("");
        
        document.querySelectorAll(".qty-dec").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = btn.dataset.id;
                const item = cart.find(i => i.id === id);
                if (item) {
                    updateCartItem(id, item.quantity - 1);
                    renderCart();
                }
            });
        });
        
        document.querySelectorAll(".qty-inc").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = btn.dataset.id;
                const item = cart.find(i => i.id === id);
                if (item) {
                    updateCartItem(id, item.quantity + 1);
                    renderCart();
                }
            });
        });
        
        updateTotals();
    }
    
    function updateTotals() {
        const subtotalUSD = getCartSubtotalUSD();
        const shipping = 2.50;
        const total = subtotalUSD + shipping;
        document.getElementById("subtotalDisplay").innerText = `$${subtotalUSD.toFixed(2)} USD`;
        document.getElementById("totalDisplay").innerHTML = `$${total.toFixed(2)} USD`;
    }
    
    document.getElementById("checkoutForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const cart = getCart();
        if (cart.length === 0) {
            alert("⚠️ Tu carrito está vacío. Agrega productos primero.");
            return;
        }
        
        const name = document.getElementById("checkoutName").value.trim();
        const address = document.getElementById("checkoutAddress").value.trim();
        const phone = document.getElementById("checkoutPhone").value.trim();
        
        if (!name || !address || !phone) {
            alert("Por favor completa todos tus datos.");
            return;
        }
        
        let productList = cart.map(item => `- ${item.name} x${item.quantity} → $${(item.priceUSD * item.quantity).toFixed(2)} USD`).join("\n");
        const subtotal = getCartSubtotalUSD();
        const total = subtotal + 2.50;
        
        const message = `🛒 *NUEVO PEDIDO - RESUELVEhabana*%0A%0A*Cliente:* ${name}%0A*Teléfono:* ${phone}%0A*Dirección:* ${address}%0A%0A*Productos:*%0A${encodeURIComponent(productList).replace(/%0A/g,'%0A')}%0A%0A📦 *Subtotal:* $${subtotal.toFixed(2)} USD%0A🚚 *Envío:* $2.50 USD%0A💰 *TOTAL:* $${total.toFixed(2)} USD%0A%0A✅ ¡Confirmar entrega!`;
        
        window.open(`https://wa.me/5356382909?text=${encodeURIComponent(message)}`, '_blank');
    });
    
    window.addEventListener('cartUpdated', () => renderCart());
    renderCart();
</script>
</body>
</html>
