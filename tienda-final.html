<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESUELVEhabana - Tienda Oficial</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Quicksand', sans-serif; background: #f3fcf0; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .toast-notification {
        position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
        background: #00535b; color: white; padding: 12px 24px; border-radius: 100px;
        font-size: 14px; font-weight: bold; z-index: 10000;
        animation: slideUpFade 2.8s ease forwards;
        font-family: 'Quicksand', sans-serif;
    }
    @keyframes slideUpFade {
        0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        15% { opacity: 1; transform: translateX(-50%) translateY(0); }
        85% { opacity: 1; transform: translateX(-50%) translateY(0); }
        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
    }
    .product-card { transition: transform 0.2s, box-shadow 0.2s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<!-- Header -->
<header class="flex justify-between items-center px-4 h-16 sticky top-0 z-50 bg-white shadow-md">
    <h1 class="text-2xl font-bold text-[#00535b]">RESUELVEhabana</h1>
    <div class="flex gap-2">
        <button id="searchBtn" class="bg-[#dce5d9] p-2 rounded-full">
            <span class="material-symbols-outlined text-[#00535b]">search</span>
        </button>
        <button id="cartBtn" class="relative bg-[#dce5d9] p-2 rounded-full">
            <span class="material-symbols-outlined text-[#00535b]">shopping_cart</span>
            <span id="cartBadge" class="absolute -top-1 -right-1 bg-[#990030] text-white text-xs w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
        </button>
    </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6 pb-28">
    <!-- Hero -->
    <div class="bg-[#006d77] rounded-2xl p-6 text-center text-white mb-6">
        <h2 class="text-2xl font-bold mb-2">Resuelve fácil, ahorra datos.</h2>
        <p>Entregas locales rápidas en La Habana. Calidad garantizada.</p>
    </div>

    <!-- Buscador (oculto por defecto) -->
    <div id="searchBox" class="hidden mb-4">
        <input type="text" id="searchInput" placeholder="🔍 Buscar productos..." class="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-[#00535b] outline-none">
    </div>

    <!-- Categorías -->
    <div id="categoriesContainer" class="flex gap-2 overflow-x-auto pb-4 mb-6">
        <button data-cat="all" class="cat-filter active px-4 py-2 bg-[#00535b] text-white rounded-full text-sm whitespace-nowrap">📦 Todos</button>
    </div>

    <!-- Grid de productos -->
    <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    <div id="noProducts" class="text-center py-12 text-gray-500 hidden">😕 No se encontraron productos</div>
    
    <!-- Modal del Carrito -->
    <div id="cartModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-auto p-5">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-[#00535b]">🛒 Tu Carrito</h2>
                <button onclick="cerrarCarrito()" class="text-2xl hover:bg-gray-100 w-8 h-8 rounded-full">✖</button>
            </div>
            <div id="cartItemsList" class="space-y-3 min-h-[200px]"></div>
            <div class="border-t pt-4 mt-4">
                <div class="flex justify-between font-bold text-lg">
                    <span>Total (USD):</span>
                    <span id="cartTotalUSD" class="text-[#7d5800]">$0.00</span>
                </div>
                <div class="flex justify-between text-sm text-gray-600 mt-1">
                    <span>Total (CUP):</span>
                    <span id="cartTotalCUP">0 CUP</span>
                </div>
            </div>
            <button onclick="irACheckout()" class="w-full bg-[#ffb702] py-3 rounded-xl font-bold mt-4 hover:brightness-95 transition">📦 Proceder al pago</button>
            <button onclick="cerrarCarrito()" class="w-full border py-2 rounded-xl mt-2">Seguir comprando</button>
        </div>
    </div>

    <!-- Modal de Checkout -->
    <div id="checkoutModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-5">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-[#00535b]">📝 Datos de envío</h2>
                <button onclick="cerrarCheckout()" class="text-2xl">✖</button>
            </div>
            <input type="text" id="checkoutName" placeholder="Nombre completo" class="w-full p-3 border rounded-lg mb-3 focus:ring-2 focus:ring-[#00535b] outline-none">
            <textarea id="checkoutAddress" placeholder="Dirección en La Habana" rows="2" class="w-full p-3 border rounded-lg mb-3 focus:ring-2 focus:ring-[#00535b] outline-none"></textarea>
            <input type="tel" id="checkoutPhone" placeholder="Teléfono (+53)" class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-[#00535b] outline-none">
            <button onclick="enviarWhatsApp()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition">📱 Enviar por WhatsApp</button>
            <button onclick="cerrarCheckout()" class="w-full border py-2 rounded-xl mt-2">Cancelar</button>
        </div>
    </div>
</main>

<footer class="fixed bottom-0 left-0 w-full bg-white border-t py-3 text-center text-sm text-gray-500">

        { id: "39", name: "Cartera Negra", category: "Accesorios", price: 1200, priceUSD: 12.00, img: "https://i.postimg.cc/XNdhzXPv/cartera-negra.webp", desc: "Cartera elegante" },
        { id: "40", name: "Chancletas Blancas", category: "Accesorios", price: 800, priceUSD: 8.00, img: "https://i.postimg.cc/VkLVvgkM/CHANCLETAS-BLANCAS.webp", desc: "Chancletas cómodas" },
        { id: "41", name: "Chancletas Negras", category: "Accesorios", price: 800, priceUSD: 8.00, img: "https://i.postimg.cc/vZHNThZ3/chancletas-negras.webp", desc: "Chancletas cómodas" }
    ];

    // ========== ESTADO DEL CARRITO ==========
    let carrito = [];

    function guardarCarrito() {
        localStorage.setItem('resuelve_cart', JSON.stringify(carrito));
        actualizarBadge();
    }

    function cargarCarrito() {
        const saved = localStorage.getItem('resuelve_cart');
        if (saved) {
            try {
                carrito = JSON.parse(saved);
            } catch(e) { carrito = []; }
        }
        actualizarBadge();
    }

    function actualizarBadge() {
        const totalItems = carrito.reduce((sum, item) => sum + item.cantidad, 0);
        const badge = document.getElementById('cartBadge');
        if (totalItems > 0) {
            badge.textContent = totalItems;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    function agregarAlCarrito(producto, cantidad = 1) {
        const existente = carrito.find(item => item.id === producto.id);
        if (existente) {
            existente.cantidad += cantidad;
        } else {
            carrito.push({ ...producto, cantidad: cantidad });
        }
        guardarCarrito();
        mostrarToast(`✓ ${producto.name} añadido al carrito`);
    }

    function mostrarToast(mensaje) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.textContent = mensaje;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 2500);
    }

    // ========== MODALES ==========
    function verCarrito() {
        const container = document.getElementById('cartItemsList');
        if (carrito.length === 0) {
            container.innerHTML = '<div class="text-center py-8 text-gray-500">🛒 Tu carrito está vacío</div>';
        } else {
            container.innerHTML = carrito.map(item => `
                <div class="flex gap-3 border-b pb-3">
                    <img src="${item.img}" class="w-16 h-16 object-cover rounded" onerror="this.src='https://placehold.co/200x200/e2ebe0/00535b?text=Producto'">
                    <div class="flex-1">
                        <h4 class="font-bold text-sm">${item.name}</h4>
                        <p class="text-xs text-gray-500">${item.category}</p>
                        <div class="flex justify-between items-center mt-1">
                            <div>
                                <span class="text-[#7d5800] font-bold">${item.price.toLocaleString()} CUP</span>
                                <span class="text-xs text-gray-500 ml-1">$${item.priceUSD.toFixed(2)}</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="cambiarCantidad('${item.id}', -1)" class="w-7 h-7 bg-gray-200 rounded-full hover:bg-gray-300">−</button>
                                <span class="w-6 text-center font-bold">${item.cantidad}</span>
                                <button onclick="cambiarCantidad('${item.id}', 1)" class="w-7 h-7 bg-gray-200 rounded-full hover:bg-gray-300">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        const totalUSD = carrito.reduce((s, i) => s + (i.priceUSD * i.cantidad), 0);
        const totalCUP = carrito.reduce((s, i) => s + (i.price * i.cantidad), 0);
        document.getElementById('cartTotalUSD').innerHTML = `$${totalUSD.toFixed(2)}`;
        document.getElementById('cartTotalCUP').innerHTML = `${totalCUP.toLocaleString()} CUP`;
        
        document.getElementById('cartModal').style.display = 'flex';
        document.getElementById('cartModal').classList.remove('hidden');
    }

    function cerrarCarrito() {
        document.getElementById('cartModal').style.display = 'none';
    }

    function cambiarCantidad(id, delta) {
        const item = carrito.find(i => i.id === id);
        if (item) {
            item.cantidad += delta;
            if (item.cantidad <= 0) {
                carrito = carrito.filter(i => i.id !== id);
            }
            guardarCarrito();
            verCarrito();
        }
    }

    function irACheckout() {
        if (carrito.length === 0) {
            mostrarToast("❌ El carrito está vacío");
            return;
        }
        cerrarCarrito();
        document.getElementById('checkoutModal').style.display = 'flex';
        document.getElementById('checkoutModal').classList.remove('hidden');
    }

    function cerrarCheckout() {
        document.getElementById('checkoutModal').style.display = 'none';
    }

    function enviarWhatsApp() {
        const nombre = document.getElementById('checkoutName').value.trim();
        const direccion = document.getElementById('checkoutAddress').value.trim();
        const telefono = document.getElementById('checkoutPhone').value.trim();
        
        if (!nombre || !direccion || !telefono) {
            mostrarToast("❌ Completa todos los datos");
            return;
        }
        
        let listaProductos = carrito.map(item => `- ${item.name} x${item.cantidad} → ${(item.price * item.cantidad).toLocaleString()} CUP`).join("\n");
        const totalUSD = carrito.reduce((s, i) => s + (i.priceUSD * i.cantidad), 0);
        const totalCUP = carrito.reduce((s, i) => s + (i.price * i.cantidad), 0);
        
        const mensaje = `🛒 *NUEVO PEDIDO - RESUELVEhabana*%0A%0A*Cliente:* ${nombre}%0A*Dirección:* ${direccion}%0A*Teléfono:* ${telefono}%0A%0A*Productos:*%0A${encodeURIComponent(listaProductos).replace(/%0A/g,'%0A')}%0A%0A📦 *Total CUP:* ${totalCUP.toLocaleString()} CUP%0A💰 *Total USD:* $${totalUSD.toFixed(2)}%0A%0A✅ ¡Confirmar entrega!`;
        
        window.open(`https://wa.me/5356382909?text=${mensaje}`, '_blank');
        cerrarCheckout();
    }

    // ========== RENDERIZAR TIENDA ==========
    let currentFilter = "all";
    let searchTerm = "";

    function getAllCategories() {
        const cats = [...new Set(PRODUCTS_CATALOG.map(p => p.category))];
        return cats.sort();
    }

    function renderizarCategorias() {
        const categorias = getAllCategories();
        const container = document.getElementById('categoriesContainer');
        const allBtn = '<button data-cat="all" class="cat-filter active px-4 py-2 bg-[#00535b] text-white rounded-full text-sm whitespace-nowrap">📦 Todos</button>';
        const catButtons = categorias.map(cat => 
            `<button data-cat="${cat}" class="cat-filter px-4 py-2 bg-gray-200 hover:bg-[#00535b]/20 rounded-full text-sm whitespace-nowrap transition">📁 ${cat}</button>`
        ).join('');
        container.innerHTML = allBtn + catButtons;
        
        document.querySelectorAll('.cat-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-filter').forEach(b => {
                    b.classList.remove('active', 'bg-[#00535b]', 'text-white');
                    b.classList.add('bg-gray-200');
                });
                btn.classList.add('active', 'bg-[#00535b]', 'text-white');
                currentFilter = btn.dataset.cat;
                renderizarProductos();
            });
        });
    }

    function renderizarProductos() {
        const grid = document.getElementById('productsGrid');
        const noProducts = document.getElementById('noProducts');
        
        let filtered = PRODUCTS_CATALOG.filter(p => {
            if (currentFilter !== 'all' && p.category !== currentFilter) return false;
            if (searchTerm && !p.name.toLowerCase().includes(searchTerm.toLowerCase()) && !p.category.toLowerCase().includes(searchTerm.toLowerCase())) return false;
            return true;
        });
        
        if (filtered.length === 0) {
            grid.innerHTML = '';
            noProducts.classList.remove('hidden');
            return;
        }
        noProducts.classList.add('hidden');
        
        grid.innerHTML = filtered.map(p => `
            <div class="product-card bg-white rounded-xl overflow-hidden shadow-md hover:shadow-xl transition-all cursor-pointer border border-gray-100">
                <div class="h-40 overflow-hidden bg-gray-100">
                    <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover hover:scale-105 transition duration-300" onerror="this.src='https://placehold.co/400x400/e2ebe0/00535b?text=Producto'">
                </div>
                <div class="p-3">
                    <span class="text-xs text-gray-500 uppercase">${p.category}</span>
                    <h3 class="font-bold text-[#00535b] text-sm mt-1 line-clamp-2">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <div>
                            <span class="font-bold text-[#7d5800]">${p.price.toLocaleString()} CUP</span>
                            <span class="text-xs text-gray-500 ml-1">$${p.priceUSD.toFixed(2)}</span>
                        </div>
                        <button onclick="agregarAlCarrito({id:'${p.id}', name:'${p.name.replace(/'/g, "\\'")}', price:${p.price}, priceUSD:${p.priceUSD}, category:'${p.category}', img:'${p.img}'}, 1)" class="w-8 h-8 bg-[#ffb702] rounded-full flex items-center justify-center hover:scale-110 transition shadow">
                            <span class="material-symbols-outlined text-sm">add</span>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ========== BUSCADOR ==========
    document.getElementById('searchBtn').addEventListener('click', () => {
        const searchBox = document.getElementById('searchBox');
        searchBox.classList.toggle('hidden');
        if (!searchBox.classList.contains('hidden')) {
            document.getElementById('searchInput').focus();
        }
    });
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchTerm = e.target.value;
        renderizarProductos();
    });
    
    document.getElementById('cartBtn').addEventListener('click', verCarrito);

    // ========== INICIALIZAR ==========
    cargarCarrito();
    renderizarCategorias();
    renderizarProductos();
</script>
</body>
</html>
