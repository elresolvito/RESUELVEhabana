<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>RESUELVEhabana | Tienda Vibrante</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Quicksand:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #e8f5e9 100%);
        font-family: 'Quicksand', sans-serif;
    }
    
    /* Estilo de burbujas estilo WhatsApp pero más orgánico */
    .bubble-bg {
        background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 70%);
    }
    
    /* Tarjetas con diferentes tamaños y estilos */
    .card-xl { grid-row: span 2; grid-column: span 2; }
    .card-lg { grid-row: span 2; }
    .card-wide { grid-column: span 2; }
    .card-tall { grid-row: span 2; }
    
    /* Animaciones de entrada */
    @keyframes floatIn {
        0% { opacity: 0; transform: translateY(30px) scale(0.95); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    
    @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        50% { box-shadow: 0 8px 25px rgba(0,83,91,0.2); }
    }
    
    @keyframes slideInLeft {
        from { opacity: 0; transform: translateX(-40px); }
        to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes slideInRight {
        from { opacity: 0; transform: translateX(40px); }
        to { opacity: 1; transform: translateX(0); }
    }
    
    .animate-float { animation: floatIn 0.6s ease forwards; }
    .animate-slide-left { animation: slideInLeft 0.5s ease forwards; }
    .animate-slide-right { animation: slideInRight 0.5s ease forwards; }
    
    .card-hover {
        transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    
    .card-hover:hover {
        transform: translateY(-8px) scale(1.02);
        filter: brightness(1.02);
    }
    
    /* Gradientes personalizados para cada tarjeta */
    .grad-1 { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
    .grad-2 { background: linear-gradient(135deg, #0abde3, #0984e3); }
    .grad-3 { background: linear-gradient(135deg, #feca57, #ff9f43); }
    .grad-4 { background: linear-gradient(135deg, #10ac84, #1dd1a1); }
    .grad-5 { background: linear-gradient(135deg, #5f27cd, #341f97); }
    .grad-6 { background: linear-gradient(135deg, #ff9ff3, #f368e0); }
    
    /* Scrollbar personalizada */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #e0e0e0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #00535b; border-radius: 10px; }
    
    /* Efecto de brillo en hover */
    .glow-on-hover:hover {
        animation: pulseGlow 0.6s ease-in-out;
    }
    
    /* Tipografía variada */
    .font-playfair { font-family: 'Playfair Display', serif; }
    .font-poppins { font-family: 'Poppins', sans-serif; }
    .font-montserrat { font-family: 'Montserrat', sans-serif; }
</style>
</head>
<body>

<!-- Header flotante estilo WhatsApp -->
<header class="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-2rem)] max-w-6xl bg-white/90 backdrop-blur-md rounded-2xl shadow-lg px-4 py-3 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-[#00535b] to-[#006d77] rounded-full flex items-center justify-center">
            <span class="material-symbols-outlined text-white">storefront</span>
        </div>
        <div>
            <h1 class="font-montserrat font-extrabold text-xl bg-gradient-to-r from-[#00535b] to-[#008b8b] bg-clip-text text-transparent">RESUELVEhabana</h1>
            <p class="text-xs text-gray-500">✨ Tu tienda de confianza</p>
        </div>
    </div>
    <div class="flex gap-2">
        <button id="searchBtn" class="w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition">
            <span class="material-symbols-outlined text-[#00535b]">search</span>
        </button>
        <button id="cartBtn" class="relative w-10 h-10 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition">
            <span class="material-symbols-outlined text-[#00535b]">shopping_cart</span>
            <span id="cartBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center hidden font-bold">0</span>
        </button>
    </div>
</header>

<main class="pt-24 pb-32 px-4 max-w-7xl mx-auto">
    <!-- Hero con diseño asimétrico -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
        <div class="md:col-span-2 bg-gradient-to-r from-[#00535b] to-[#008b8b] rounded-3xl p-8 text-white animate-slide-left">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-3 font-poppins">🔥 OFERTA DEL DÍA</span>
            <h2 class="font-playfair text-3xl md:text-4xl font-bold mb-2">¡Hasta 20% de descuento!</h2>
            <p class="font-quicksand opacity-90 mb-4">En productos seleccionados. Compra hoy y recibe en 24h.</p>
            <button class="bg-white text-[#00535b] px-6 py-2 rounded-full font-bold hover:scale-105 transition">Ver ofertas →</button>
        </div>
        <div class="bg-gradient-to-br from-[#feca57] to-[#ff9f43] rounded-3xl p-6 text-white animate-slide-right">
            <span class="material-symbols-outlined text-4xl">local_shipping</span>
            <h3 class="font-bold text-xl mt-2">Envío Rápido</h3>
            <p class="text-sm opacity-90">Entregamos en toda La Habana</p>
        </div>
    </div>

    <!-- Buscador (toggle) -->
    <div id="searchBox" class="hidden mb-6 animate-float">
        <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">search</span>
            <input type="text" id="searchInput" placeholder="Buscar productos..." class="w-full p-4 pl-12 rounded-2xl border-2 border-gray-200 focus:border-[#00535b] focus:ring-2 focus:ring-[#00535b]/20 outline-none transition font-quicksand">
        </div>
    </div>

    <!-- Categorías con diseño de pastillas -->
    <div id="categoriesContainer" class="flex gap-2 overflow-x-auto pb-4 mb-8 no-scrollbar"></div>

    <!-- Grid de productos con diseño BENTO (diferentes tamaños) -->
    <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 auto-rows-[280px]"></div>
    <div id="noProducts" class="text-center py-20 text-gray-500 hidden">😕 No se encontraron productos</div>
</main>

<!-- Modal Carrito -->
<div id="cartModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-3xl max-w-lg w-full max-h-[85vh] overflow-auto animate-float">
        <div class="sticky top-0 bg-white p-5 border-b flex justify-between items-center">
            <h2 class="font-montserrat text-2xl font-bold text-[#00535b]">🛒 Tu Carrito</h2>
            <button onclick="cerrarCarrito()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center hover:bg-gray-200">✖</button>
        </div>
        <div id="cartItemsList" class="p-5 space-y-3"></div>
        <div class="border-t p-5 bg-gray-50">
            <div class="flex justify-between font-bold text-lg">
                <span>Total:</span>
                <span id="cartTotal" class="text-[#7d5800]">$0.00</span>
            </div>
            <button onclick="irACheckout()" class="w-full bg-[#ffb702] py-3 rounded-xl font-bold mt-4 hover:brightness-95 transition">📦 Proceder al pago</button>
        </div>
    </div>
</div>

<!-- Modal Checkout -->
<div id="checkoutModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
    <div class="bg-white rounded-3xl max-w-md w-full p-6 animate-float">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-montserrat text-2xl font-bold text-[#00535b]">📝 Datos de envío</h2>
            <button onclick="cerrarCheckout()" class="text-2xl">✖</button>
        </div>
        <input type="text" id="checkoutName" placeholder="Nombre completo" class="w-full p-3 border rounded-xl mb-3 focus:ring-2 focus:ring-[#00535b] outline-none">
        <textarea id="checkoutAddress" placeholder="Dirección en La Habana" rows="2" class="w-full p-3 border rounded-xl mb-3 focus:ring-2 focus:ring-[#00535b] outline-none"></textarea>
        <input type="tel" id="checkoutPhone" placeholder="Teléfono (+53)" class="w-full p-3 border rounded-xl mb-4 focus:ring-2 focus:ring-[#00535b] outline-none">
        <button onclick="enviarWhatsApp()" class="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition">📱 Enviar por WhatsApp</button>
    </div>
</div>

<style>.no-scrollbar::-webkit-scrollbar { display: none; }</style>

<script>
    // ========== CATÁLOGO DE PRODUCTOS ==========
    const PRODUCTS_CATALOG = [
        { id: "1", name: "Atún en lata", category: "Alimentos", price: 540, priceUSD: 5.40, img: "https://i.postimg.cc/76xHK6zt/atun_precio_500.png", desc: "Lata estándar 200g", badge: "🔥 Más vendido", size: "normal" },
        { id: "2", name: "Café Dualis 250g", category: "Alimentos", price: 1450, priceUSD: 14.50, img: "https://i.postimg.cc/WbZBX2hN/cafe_dualis_250_g_precio_1450.png", desc: "Café de alta calidad", badge: "⭐ Premium", size: "wide" },
        { id: "3", name: "Cartón huevos 30u", category: "Alimentos", price: 3000, priceUSD: 30.00, img: "https://i.postimg.cc/sDWkwVvv/carton_de_huevo_30_u_precio_3000.png", desc: "30 huevos frescos", badge: "🥚 Oferta", size: "normal" },
        { id: "4", name: "Perfume Candy", category: "Perfumes", price: 3100, priceUSD: 31.00, img: "https://i.postimg.cc/vTgJRyhp/perfume_candy_precio_3100.png", desc: "Fragancia única", badge: "✨ Exclusivo", size: "tall" },
        { id: "5", name: "Whisky 1L", category: "Bebidas", price: 1350, priceUSD: 13.50, img: "https://i.postimg.cc/cLyrb4T0/whisky_1L_precio_1350.png", desc: "Whisky añejo", badge: "🥃 Importado", size: "normal" },
        { id: "6", name: "Papitas Campesinas", category: "Snacks", price: 690, priceUSD: 6.90, img: "https://i.postimg.cc/cLgrDtf9/papitas_campesinas_precio_690.png", desc: "Papitas artesanales", badge: "🍟 Nuevo", size: "normal" },
        { id: "7", name: "Cartera Beige", category: "Accesorios", price: 1200, priceUSD: 12.00, img: "https://i.postimg.cc/jdT90t0x/cartera-beige.webp", desc: "Cartera elegante", badge: "👛 Tendencias", size: "wide" },
        { id: "8", name: "Chancletas Negras", category: "Accesorios", price: 800, priceUSD: 8.00, img: "https://i.postimg.cc/vZHNThZ3/chancletas-negras.webp", desc: "Cómodas y duraderas", badge: "🩴 Verano", size: "normal" },
        { id: "9", name: "Mayonesa Grande", category: "Salsas", price: 1100, priceUSD: 11.00, img: "https://i.postimg.cc/Px2t9jzz/mayonesa_precio1100.png", desc: "Frasco grande", badge: "", size: "normal" },
        { id: "10", name: "Jabón Marwa", category: "Higiene", price: 150, priceUSD: 1.50, img: "https://i.postimg.cc/3RK8tRpR/jabon_marwa_precio_150.png", desc: "Pastilla de jabón", badge: "🧼 Esencial", size: "normal" },
        { id: "11", name: "Licor de fresa", category: "Bebidas", price: 2500, priceUSD: 25.00, img: "https://i.postimg.cc/59YT2x5p/licor_de_fresa_precio_2500.png", desc: "Sabor frutal", badge: "🍓 Especial", size: "tall" },
        { id: "12", name: "Vino Pluvium", category: "Bebidas", price: 1200, priceUSD: 12.00, img: "https://i.postimg.cc/XNLLWmmx/vino_pluvium_precio_1200.png", desc: "Vino tinto", badge: "🍷 Reserva", size: "normal" },
        { id: "13", name: "Desodorante Rush", category: "Perfumes", price: 1000, priceUSD: 10.00, img: "https://i.postimg.cc/sXVjTXSF/desodorante_rush_precio_1000.png", desc: "Protección 24h", badge: "", size: "normal" },
        { id: "14", name: "Baterías Triple A", category: "Electrónicos", price: 300, priceUSD: 3.00, img: "https://i.postimg.cc/DZ2vxZsT/Gemini_Generated_Image_824rio824rio824r.png", desc: "Pack 4 unidades", badge: "🔋 Útil", size: "normal" },
        { id: "15", name: "Leche condensada", category: "Alimentos", price: 950, priceUSD: 9.50, img: "https://i.postimg.cc/tT2XwjtT/leche_condensada.png", desc: "Lata 397g", badge: "🥛 Dulce", size: "wide" }
    ];

    let carrito = [];
    let currentFilter = "all";
    let searchTerm = "";

    // Funciones del carrito
    function guardarCarrito() { localStorage.setItem('resuelve_cart', JSON.stringify(carrito)); actualizarBadge(); }
    function cargarCarrito() { const saved = localStorage.getItem('resuelve_cart'); if (saved) { try { carrito = JSON.parse(saved); } catch(e) { carrito = []; } } actualizarBadge(); }
    function actualizarBadge() { const total = carrito.reduce((s, i) => s + i.cantidad, 0); const badge = document.getElementById('cartBadge'); if (total > 0) { badge.textContent = total; badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); } }
    
    function agregarAlCarrito(producto) {
        const existente = carrito.find(i => i.id === producto.id);
        if (existente) { existente.cantidad++; } 
        else { carrito.push({ ...producto, cantidad: 1 }); }
        guardarCarrito();
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-[#00535b] text-white px-5 py-3 rounded-full text-sm font-bold z-[100] animate-float';
        toast.innerHTML = `✓ ${producto.name} añadido`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // Renderizar categorías
    function getAllCategories() { return [...new Set(PRODUCTS_CATALOG.map(p => p.category))].sort(); }
    
    function renderizarCategorias() {
        const categorias = getAllCategories();
        const container = document.getElementById('categoriesContainer');
        container.innerHTML = `<button data-cat="all" class="cat-filter px-5 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all" style="background: #00535b; color: white; box-shadow: 0 2px 8px rgba(0,83,91,0.3);">📦 Todos</button>` +
            categorias.map(cat => `<button data-cat="${cat}" class="cat-filter px-5 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-all bg-white/80 hover:bg-[#00535b]/10 text-gray-700">📁 ${cat}</button>`).join('');
        
        document.querySelectorAll('.cat-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-filter').forEach(b => { b.style.background = ''; b.style.color = ''; b.style.boxShadow = ''; b.classList.add('bg-white/80', 'text-gray-700'); });
                btn.style.background = '#00535b'; btn.style.color = 'white'; btn.style.boxShadow = '0 2px 8px rgba(0,83,91,0.3)';
                currentFilter = btn.dataset.cat;
                renderizarProductos();
            });
        });
    }

    // Renderizar productos con diseño BENTO (diferentes tamaños)
    function renderizarProductos() {
        const grid = document.getElementById('productsGrid');
        const noProducts = document.getElementById('noProducts');
        
        let filtered = PRODUCTS_CATALOG.filter(p => {
            if (currentFilter !== 'all' && p.category !== currentFilter) return false;
            if (searchTerm && !p.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
            return true;
        });
        
        if (filtered.length === 0) { grid.innerHTML = ''; noProducts.classList.remove('hidden'); return; }
        noProducts.classList.add('hidden');
        
        // Asignar clases de tamaño diferentes para crear variedad visual
        const sizeClasses = ['', 'md:row-span-2', 'md:col-span-2', 'md:row-span-2 md:col-span-2', ''];
        const badgeColors = ['bg-red-500', 'bg-purple-500', 'bg-orange-500', 'bg-green-500', 'bg-pink-500', 'bg-blue-500'];
        
        grid.innerHTML = filtered.map((p, idx) => {
            const sizeClass = p.size === 'wide' ? 'md:col-span-2' : (p.size === 'tall' ? 'md:row-span-2' : (idx % 7 === 0 ? 'md:col-span-2' : ''));
            const badgeColor = badgeColors[idx % badgeColors.length];
            const randomDelay = (idx % 5) * 0.1;
            
            return `
                <div class="bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 group cursor-pointer ${sizeClass} animate-float" style="animation-delay: ${randomDelay}s;" onclick="verDetalle('${p.id}')">
                    <div class="relative h-48 overflow-hidden">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500" onerror="this.src='https://placehold.co/400x400/e2ebe0/00535b?text=Producto'">
                        ${p.badge ? `<span class="absolute top-3 left-3 ${badgeColor} text-white text-xs px-2 py-1 rounded-full font-bold shadow-md">${p.badge}</span>` : ''}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-0 group-hover:opacity-100 transition"></div>
                        <button onclick="event.stopPropagation(); agregarAlCarrito({id:'${p.id}', name:'${p.name.replace(/'/g, "\\'")}', price:${p.price}, priceUSD:${p.priceUSD}, img:'${p.img}'})" class="absolute bottom-3 right-3 w-10 h-10 bg-[#ffb702] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition transform translate-y-2 group-hover:translate-y-0 opacity-0 group-hover:opacity-100">
                            <span class="material-symbols-outlined text-[#00535b]">add</span>
                        </button>
                    </div>
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs font-poppins text-gray-400 uppercase tracking-wider">${p.category}</span>
                            <span class="text-xs text-green-600">★ 4.8</span>
                        </div>
                        <h3 class="font-montserrat font-bold text-[#00535b] text-base line-clamp-1">${p.name}</h3>
                        <p class="text-xs text-gray-500 mt-1 line-clamp-2 font-quicksand">${p.desc}</p>
                        <div class="flex justify-between items-center mt-3">
                            <div>
                                <span class="font-montserrat font-extrabold text-[#7d5800] text-lg">${p.price.toLocaleString()} CUP</span>
                                <span class="text-xs text-gray-400 ml-1">$${p.priceUSD.toFixed(2)}</span>
                            </div>
                            <div class="flex gap-1">
                                <span class="material-symbols-outlined text-yellow-400 text-sm">star</span>
                                <span class="material-symbols-outlined text-yellow-400 text-sm">star</span>
                                <span class="material-symbols-outlined text-yellow-400 text-sm">star</span>
                                <span class="material-symbols-outlined text-yellow-400 text-sm">star</span>
                                <span class="material-symbols-outlined text-gray-300 text-sm">star</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function verDetalle(id) { mostrarToast("✨ Detalles disponibles pronto"); }
    function mostrarToast(mensaje) { const toast = document.createElement('div'); toast.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-full text-sm z-[100] animate-float'; toast.textContent = mensaje; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000); }
    
    // Modales
    function verCarrito() {
        const container = document.getElementById('cartItemsList');
        if (carrito.length === 0) { container.innerHTML = '<div class="text-center py-10 text-gray-500">🛒 Tu carrito está vacío</div>'; }
        else {
            container.innerHTML = carrito.map(item => `
                <div class="flex gap-3 border-b pb-3">
                    <img src="${item.img}" class="w-16 h-16 object-cover rounded-xl">
                    <div class="flex-1"><h4 class="font-bold">${item.name}</h4><div class="flex justify-between mt-1"><span class="text-[#7d5800] font-bold">${item.price.toLocaleString()} CUP</span><div class="flex gap-2"><button onclick="cambiarCantidad('${item.id}', -1)" class="w-7 h-7 bg-gray-100 rounded-full">-</button><span>${item.cantidad}</span><button onclick="cambiarCantidad('${item.id}', 1)" class="w-7 h-7 bg-gray-100 rounded-full">+</button></div></div></div>
                </div>
            `).join('');
        }
        const totalUSD = carrito.reduce((s, i) => s + (i.priceUSD * i.cantidad), 0);
        document.getElementById('cartTotal').innerHTML = `$${totalUSD.toFixed(2)} USD`;
        document.getElementById('cartModal').style.display = 'flex';
    }
    
    function cerrarCarrito() { document.getElementById('cartModal').style.display = 'none'; }
    function cambiarCantidad(id, delta) { const item = carrito.find(i => i.id === id); if (item) { item.cantidad += delta; if (item.cantidad <= 0) carrito = carrito.filter(i => i.id !== id); guardarCarrito(); verCarrito(); } }
    function irACheckout() { if (carrito.length === 0) { mostrarToast("❌ Carrito vacío"); return; } cerrarCarrito(); document.getElementById('checkoutModal').style.display = 'flex'; }
    function cerrarCheckout() { document.getElementById('checkoutModal').style.display = 'none'; }
    
    function enviarWhatsApp() {
        const nombre = document.getElementById('checkoutName').value.trim();
        const direccion = document.getElementById('checkoutAddress').value.trim();
        const telefono = document.getElementById('checkoutPhone').value.trim();
        if (!nombre || !direccion || !telefono) { mostrarToast("❌ Completa todos los datos"); return; }
        let lista = carrito.map(i => `- ${i.name} x${i.cantidad} → ${(i.price * i.cantidad).toLocaleString()} CUP`).join("\n");
        const totalUSD = carrito.reduce((s, i) => s + (i.priceUSD * i.cantidad), 0);
        const msg = `🛒 *NUEVO PEDIDO*%0A%0A*Cliente:* ${nombre}%0A*Dirección:* ${direccion}%0A*Teléfono:* ${telefono}%0A%0A*Productos:*%0A${encodeURIComponent(lista)}%0A%0A💰 *Total:* $${totalUSD.toFixed(2)} USD`;
        window.open(`https://wa.me/5356382909?text=${msg}`, '_blank');
        cerrarCheckout();
    }

    document.getElementById('searchBtn').addEventListener('click', () => { document.getElementById('searchBox').classList.toggle('hidden'); });
    document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value; renderizarProductos(); });
    document.getElementById('cartBtn').addEventListener('click', verCarrito);
    
    cargarCarrito();
    renderizarCategorias();
    renderizarProductos();
</script>
</body>
</html>
