<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Detalle del Producto - RESUELVEhabana</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Quicksand:wght@500;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="js/cart-state.js"></script>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    surface: "#f3fcf0", primary: "#00535b", "secondary-container": "#ffb702", secondary: "#7d5800",
                    tertiary: "#990030", "surface-container-lowest": "#ffffff", "surface-container-low": "#edf6ea",
                    "on-surface": "#161d16", outline: "#6f797a", "outline-variant": "#bec8ca", "on-surface-variant": "#3e494a"
                },
                borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
                spacing: { gutter: "16px", md: "24px", "container-max": "1200px" },
                fontFamily: { "display-lg-mobile": ["Montserrat"], "headline-md": ["Montserrat"], "body-md": ["Quicksand"], "label-sm": ["Quicksand"] },
                fontSize: { "display-lg-mobile": ["32px", { lineHeight: "1.2", fontWeight: "700" }], "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }], "body-md": ["16px", { lineHeight: "1.6", fontWeight: "500" }], "label-sm": ["14px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "700" }] }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    body { font-family: 'Quicksand', sans-serif; background-color: #f3fcf0; }
    .cart-badge { display: none; }
</style>
</head>
<body class="bg-surface">

<header class="fixed top-0 w-full z-50 bg-surface shadow-sm" id="top-app-bar">
    <div class="flex items-center justify-between px-gutter h-16 max-w-container-max mx-auto">
        <div class="flex items-center gap-4">
            <a href="index.html" class="p-2 rounded-full hover:bg-primary/10 flex items-center justify-center text-primary">
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
            <h1 class="font-headline-md text-primary">RESUELVEhabana</h1>
        </div>
        <a href="cart.html" class="relative">
            <span class="material-symbols-outlined p-2 rounded-full hover:bg-primary/10 text-primary">shopping_cart</span>
            <span class="cart-badge absolute top-1 right-1 bg-tertiary text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold" style="display: none;">0</span>
        </a>
    </div>
</header>

<main class="pt-20 pb-28 max-w-container-max mx-auto px-gutter">
    <div id="productDetailContainer" class="grid grid-cols-1 md:grid-cols-12 gap-6">
        <div class="md:col-span-12 text-center py-20">Cargando producto...</div>
    </div>

    <section class="mt-12">
        <h3 class="font-headline-md text-headline-md mb-4">✨ Productos relacionados</h3>
        <div id="relatedProductsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </section>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-lowest shadow-[0_-4px_12px_rgba(0,109,119,0.08)] flex justify-around items-center px-2 py-3 rounded-t-xl">
    <a href="index.html" class="flex flex-col items-center text-on-surface-variant">
        <span class="material-symbols-outlined">storefront</span>
        <span class="font-label-sm text-label-sm">Tienda</span>
    </a>
    <a href="cart.html" class="flex flex-col items-center text-on-surface-variant">
        <span class="material-symbols-outlined">shopping_basket</span>
        <span class="font-label-sm text-label-sm">Carrito</span>
    </a>
</nav>

<script>
    let currentProduct = null;
    let quantity = 1;
    
    function getProductIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }
    
    function renderProductDetail() {
        const productId = getProductIdFromURL();
        if (!productId) {
            window.location.href = 'index.html';
            return;
        }
        
        const product = getProductById(productId);
        if (!product) {
            document.getElementById("productDetailContainer").innerHTML = '<div class="md:col-span-12 text-center py-20 text-error">❌ Producto no encontrado</div>';
            return;
        }
        
        currentProduct = product;
        
        document.getElementById("productDetailContainer").innerHTML = `
            <div class="md:col-span-7 lg:col-span-8 rounded-xl overflow-hidden bg-surface-container-lowest shadow-md">
                <img src="${product.img}" alt="${product.name}" class="w-full h-[400px] md:h-[500px] object-cover" onerror="this.src='https://placehold.co/800x800/e2ebe0/00535b?text=${encodeURIComponent(product.name)}'">
            </div>
            <div class="md:col-span-5 lg:col-span-4">
                <div class="bg-surface-container-lowest rounded-xl p-5 shadow-md">
                    <div class="flex justify-between items-start mb-3">
                        <span class="px-3 py-1 rounded-full bg-primary/10 text-primary text-sm">${product.category}</span>
                        <span class="material-symbols-outlined text-secondary cursor-pointer hover:scale-110 transition">favorite_border</span>
                    </div>
                    <h2 class="font-display-lg-mobile text-display-lg-mobile text-primary mb-2">${product.name}</h2>
                    <div class="mb-3">
                        <span class="text-secondary font-bold text-3xl">${product.price.toLocaleString()} CUP</span>
                        <span class="text-outline ml-2">$${product.priceUSD.toFixed(2)} USD</span>
                    </div>
                    <p class="text-on-surface-variant text-sm leading-relaxed mb-5">${product.desc || "Producto de alta calidad, seleccionado especialmente para ti. Ideal para el consumo diario en el hogar cubano."}</p>
                    
                    <div class="flex items-center justify-between p-3 bg-surface-container-low rounded-xl mb-4">
                        <span class="text-sm font-bold">Cantidad</span>
                        <div class="flex items-center gap-4">
                            <button id="qtyMinus" class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-primary active:scale-90 text-xl">−</button>
                            <span id="qtyValue" class="font-bold text-xl w-8 text-center">1</span>
                            <button id="qtyPlus" class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center text-primary active:scale-90 text-xl">+</button>
                        </div>
                    </div>
                    
                    <button id="addToCartBtnDetail" class="w-full bg-secondary-container text-on-secondary-container font-bold py-4 rounded-xl shadow-md flex items-center justify-center gap-2 hover:brightness-95 active:scale-95 transition-all">
                        <span class="material-symbols-outlined">shopping_basket</span> Añadir al Carrito
                    </button>
                    <button onclick="window.location.href='cart.html'" class="w-full mt-3 py-3 rounded-xl border border-primary text-primary font-bold hover:bg-primary/5 transition">
                        🛒 Ver Carrito →
                    </button>
                </div>
            </div>
        `;
        
        document.getElementById("qtyMinus").addEventListener("click", () => {
            if (quantity > 1) quantity--;
            document.getElementById("qtyValue").innerText = quantity;
        });
        document.getElementById("qtyPlus").addEventListener("click", () => {
            quantity++;
            document.getElementById("qtyValue").innerText = quantity;
        });
        document.getElementById("addToCartBtnDetail").addEventListener("click", () => {
            addToCart(currentProduct, quantity);
            quantity = 1;
            document.getElementById("qtyValue").innerText = "1";
        });
        
        // Productos relacionados (misma categoría, excluyendo actual)
        const related = PRODUCTS_CATALOG.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
        const relatedHTML = related.map(p => `
            <div onclick="window.location.href='product-detail.html?id=${p.id}'" class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-md cursor-pointer hover:shadow-lg transition hover:-translate-y-1">
                <div class="h-32 overflow-hidden bg-surface-container-low"><img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/300x300/e2ebe0/00535b?text=${encodeURIComponent(p.name)}'"></div>
                <div class="p-2">
                    <h4 class="font-bold text-sm truncate">${p.name}</h4>
                    <p class="text-primary font-bold text-sm">${p.price.toLocaleString()} CUP</p>
                </div>
            </div>
        `).join("");
        document.getElementById("relatedProductsGrid").innerHTML = relatedHTML || '<p class="text-on-surface-variant">No hay productos relacionados</p>';
    }
    
    document.addEventListener("DOMContentLoaded", () => {
        renderProductDetail();
    });
    
    window.addEventListener('cartUpdated', () => {});
</script>
</body>
</html>
