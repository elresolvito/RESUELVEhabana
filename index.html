<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RESUELVEhabana - Clasificados de Cuba</title>
    <style>
        /* ... (mismo estilo que antes) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            padding: 12px;
            padding-bottom: 80px;
        }
        /* ... resto del CSS igual al que ya teníamos ... */
    </style>
</head>
<body>
<!-- ... mismo HTML que antes, pero el JavaScript cambia ... -->

<script>
    // ==========================================================
    // CONFIGURACIÓN DE GOOGLE SHEETS
    // (Reemplazar con tus valores reales)
    // ==========================================================
    // Publica tu Sheet como CSV y usa esta URL:
    // https://docs.google.com/spreadsheets/d/SPREADSHEET_ID/export?format=csv&gid=0
    const SPREADSHEET_ID = "TU_SPREADSHEET_ID";  // Cambiar por el ID real
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;
    
    let products = [];
    let favorites = [];
    let currentCategory = "all";
    let searchTerm = "";
    let minPriceFilter = "";
    let maxPriceFilter = "";
    let dataSaverMode = false;
    
    // Cargar favoritos
    function loadFavorites() {
        const saved = localStorage.getItem('resuelvehabana_favorites');
        if (saved) favorites = JSON.parse(saved);
    }
    
    function saveFavorites() {
        localStorage.setItem('resuelvehabana_favorites', JSON.stringify(favorites));
    }
    
    function isFavorite(productId) {
        return favorites.includes(productId);
    }
    
    function toggleFavorite(productId) {
        const index = favorites.indexOf(productId);
        if (index === -1) favorites.push(productId);
        else favorites.splice(index, 1);
        saveFavorites();
        renderProducts();
        return favorites.indexOf(productId) !== -1;
    }
    
    // Cargar productos desde Google Sheets CSV
    async function loadProductsFromSheet() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            
            // Parsear CSV simple
            const lines = csvText.split('\n');
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
            
            const productsList = [];
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                // Parsear CSV respetando comillas
                const values = [];
                let currentValue = '';
                let inQuotes = false;
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(currentValue.trim());
                        currentValue = '';
                    } else {
                        currentValue += char;
                    }
                }
                values.push(currentValue.trim());
                
                if (values.length >= 8) {
                    productsList.push({
                        id: values[0].replace(/"/g, ''),
                        title: values[1].replace(/"/g, ''),
                        price: values[2].replace(/"/g, ''),
                        category: values[3].replace(/"/g, ''),
                        contact: values[4].replace(/"/g, ''),
                        image: values[5].replace(/"/g, ''),
                        seller: values[6].replace(/"/g, ''),
                        last_updated: parseInt(values[7]) || Date.now(),
                        sold: values[8] === 'TRUE'
                    });
                }
            }
            
            return productsList;
        } catch (error) {
            console.error('Error cargando desde Google Sheets:', error);
            return [];
        }
    }
    
    async function loadProducts() {
        const grid = document.getElementById('productsGrid');
        if (grid) grid.innerHTML = '<div class="loading">📡 Cargando productos...</div>';
        
        products = await loadProductsFromSheet();
        renderProducts();
    }
    
    function getPriceValue(priceStr) {
        const match = priceStr?.toString().match(/\d+/);
        return match ? parseInt(match[0]) : null;
    }
    
    function filterProducts() {
        return products.filter(p => {
            if (p.sold) return false;
            if (currentCategory !== 'all' && p.category !== currentCategory) return false;
            if (searchTerm && !p.title.toLowerCase().includes(searchTerm.toLowerCase())) return false;
            const val = getPriceValue(p.price);
            if (minPriceFilter && val && val < parseFloat(minPriceFilter)) return false;
            if (maxPriceFilter && val && val > parseFloat(maxPriceFilter)) return false;
            return true;
        }).sort((a, b) => b.last_updated - a.last_updated);
    }
    
    function renderProducts() {
        const filtered = filterProducts();
        const grid = document.getElementById('productsGrid');
        const activeCount = products.filter(p => !p.sold).length;
        const statsDiv = document.getElementById('stats');
        if (statsDiv) statsDiv.innerHTML = `📊 ${activeCount} anuncios activos | ❤️ ${favorites.length} favoritos`;
        
        if (!grid) return;
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty-message">📭 No hay anuncios en esta categoría.</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(product => {
            const isNew = (Date.now() - product.last_updated) < 86400000;
            const isSold = product.sold;
            const isFav = isFavorite(product.id);
            const contactClean = product.contact.replace(/[^0-9]/g, '');
            
            let imageHtml = dataSaverMode
                ? `<div class="product-img" style="display:flex;align-items:center;justify-content:center;background:#e0e0e0;font-size:12px;">📷 Modo ahorro</div>`
                : `<img class="product-img" src="${product.image}" alt="${product.title}" loading="lazy" onerror="this.src='https://placehold.co/400x400/e0e0e0/999?text=Sin+foto'">`;
            
            return `
                <div class="product-card ${isSold ? 'sold' : ''}" data-id="${product.id}">
                    ${isNew && !isSold ? '<span class="new-badge">✨ NUEVO</span>' : ''}
                    ${isSold ? '<div class="sold-badge">VENDIDO</div>' : ''}
                    <div class="favorite-icon ${isFav ? 'active' : ''}" data-fav="${product.id}">${isFav ? '❤️' : '🤍'}</div>
                    ${imageHtml}
                    <div class="product-info">
                        <div class="product-title">${escapeHtml(product.title)}</div>
                        <div class="product-price">💰 ${escapeHtml(product.price)}</div>
                        <div class="product-contact">📞 ${escapeHtml(product.contact)}</div>
                        <button class="whatsapp-btn" data-wa="${contactClean}" data-id="${product.id}">
                            💬 WhatsApp
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        
        // Event listeners...
        attachEventListeners();
    }
    
    function attachEventListeners() {
        document.querySelectorAll('.favorite-icon').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = icon.dataset.fav;
                const isNowFav = toggleFavorite(id);
                icon.innerHTML = isNowFav ? '❤️' : '🤍';
                icon.classList.toggle('active', isNowFav);
                const statsDiv = document.getElementById('stats');
                if (statsDiv) statsDiv.innerHTML = `📊 ${products.filter(p => !p.sold).length} anuncios activos | ❤️ ${favorites.length} favoritos`;
            });
        });
        
        document.querySelectorAll('.whatsapp-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const waNumber = btn.dataset.wa;
                window.open(`https://wa.me/${waNumber}`, '_blank');
            });
        });
        
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.favorite-icon') || e.target.closest('.whatsapp-btn')) return;
                const id = card.dataset.id;
                const product = products.find(p => p.id === id);
                if (product) openModal(product);
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }
    
    // Modal functions (simplificadas)
    function openModal(product) {
        alert(`🔍 ${product.title}\n💰 ${product.price}\n📞 ${product.contact}\n📂 ${product.category}\n👤 Vendedor: ${product.seller || 'No especificado'}\n\n💬 Contacta por WhatsApp al ${product.contact}`);
    }
    
    function setupFilters() {
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderProducts();
            });
        });
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.addEventListener('input', (e) => { searchTerm = e.target.value; renderProducts(); });
        const minInput = document.getElementById('minPrice');
        if (minInput) minInput.addEventListener('input', (e) => { minPriceFilter = e.target.value; renderProducts(); });
        const maxInput = document.getElementById('maxPrice');
        if (maxInput) maxInput.addEventListener('input', (e) => { maxPriceFilter = e.target.value; renderProducts(); });
    }
    
    function setupDataSaver() {
        const btn = document.getElementById('dataSaverBtn');
        if (btn) {
            btn.addEventListener('click', () => {
                dataSaverMode = !dataSaverMode;
                btn.textContent = dataSaverMode ? "💾 Modo ahorro: ON" : "💾 Modo ahorro: OFF";
                btn.classList.toggle('active', dataSaverMode);
                renderProducts();
            });
        }
    }
    
    function init() {
        loadFavorites();
        setupFilters();
        setupDataSaver();
        loadProducts();
        setInterval(() => { if (document.visibilityState === 'visible') loadProducts(); }, 60000);
    }
    
    init();
</script>
</body>
</html>
